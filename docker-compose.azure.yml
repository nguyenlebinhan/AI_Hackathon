services:
  api:
    ports: !reset []

  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  minio:
    ports: !reset []

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    environment:
      VADS_SITE_ADDRESS: "${VADS_SITE_ADDRESS:-:80}"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
